            <p class="text-[#49749c] text-sm font-normal leading-normal line-clamp-2">Brake Replacement</p>

            <p class="text-[#0d151c] text-base font-medium leading-normal line-clamp-1">2023-07-28</p>
            <p class="text-[#49749c] text-sm font-normal leading-normal line-clamp-2">Air Filter Change</p>

          <div class="shrink-0"><p class="text-[#0d151c] text-base font-normal leading-normal">$30</p></div>

              <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">

              <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
