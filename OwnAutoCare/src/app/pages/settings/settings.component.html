<ion-header>
  <ion-toolbar>
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="center-content">
    <ng-container *ngIf="isAuthenticated; else notAuthenticated">
      <app-google-sign-out></app-google-sign-out>
    </ng-container>
    <ng-template #notAuthenticated>

      <app-google-sign-in></app-google-sign-in>
    </ng-template>
  </div>
</ion-content>
